<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BritFlow">
<title>BritFlow — 30 Min Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Outfit:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
/* SEU ESTILO ORIGINAL COM MELHORIAS */
:root{ --bg:#07080d;--s1:#0d0e15;--s2:#13141e;--text:#f2f0f8;--lc:#4ecdc4;--border:#22243a;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;height:100vh;display:flex;flex-direction:column;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--s1);border-bottom:1px solid var(--border)}
.timer-box{font-family:'JetBrains Mono';background:var(--s2);padding:5px 15px;border-radius:20px;border:1px solid var(--lc);color:var(--lc);font-weight:bold;}
.content{flex:1;overflow-y:auto;padding:20px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:15px;padding:20px;margin-bottom:20px;}
.btn-mic{background:#ff4757;color:white;border:none;border-radius:50%;width:50px;height:50px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:0.3s;}
.btn-mic.active{animation:pulse-red 1s infinite;background:#ff0000;}
@keyframes pulse-red{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.speed-row{display:flex;gap:10px;margin-bottom:15px;}
.spd-btn{background:var(--s2);border:1px solid var(--border);color:white;padding:5px 12px;border-radius:10px;cursor:pointer;}
.spd-btn.active{border-color:var(--lc);color:var(--lc);}
.next-btn{width:100%;padding:15px;background:var(--lc);color:var(--bg);border:none;border-radius:12px;font-weight:bold;font-size:1rem;margin-top:20px;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
    <div style="font-family:'Fraunces';font-size:1.4rem">BritFlow</div>
    <div class="timer-box">⏳ <span id="timerVal">30:00</span></div>
</div>

<div class="content" id="app">
    </div>

<script>
// CONFIGURAÇÕES DA AULA
let timeLeft = 30 * 60; // 30 minutos
let speechRate = 1.0;
let recognition;

// BANCO DE FRASES PARA O "MODO INFINITO"
const sentences = [
    {en: "Could I get a flat white, please?", pt: "Poderia me dar um flat white, por favor?"},
    {en: "I'm looking for the nearest tube station.", pt: "Estou procurando a estação de metrô mais próxima."},
    {en: "It's a bit chilly today, isn't it?", pt: "Está um pouco frio hoje, não está?"},
    {en: "I'd like to book a table for two tonight.", pt: "Gostaria de reservar uma mesa para dois hoje à noite."},
    {en: "Do you have any vegetarian options?", pt: "Você tem alguma opção vegetariana?"},
    {en: "Cheers for your help, I really appreciate it.", pt: "Obrigado pela ajuda, eu realmente agradeço."},
    {en: "I'm just browsing, thank you.", pt: "Estou só dando uma olhadinha, obrigado."}
];

// INICIAR TIMER
function startTimer() {
    const timerDisplay = document.getElementById('timerVal');
    const interval = setInterval(() => {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        timerDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) {
            clearInterval(interval);
            alert("Parabéns! Você completou seus 30 minutos de hoje!");
        }
        timeLeft--;
    }, 1000);
}

// FUNÇÃO DE VOZ (PROFESSOR FALA)
function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB';
    u.rate = speechRate;
    window.speechSynthesis.speak(u);
}

// CONFIGURAR RECONHECIMENTO DE VOZ (VOCÊ FALA)
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onresult = (e) => {
        document.getElementById('user-input').value = e.results[0][0].transcript;
        document.getElementById('mic-btn').classList.remove('active');
    };
}

function startListening() {
    if(!recognition) return alert("Microfone não suportado no seu navegador.");
    recognition.start();
    document.getElementById('mic-btn').classList.add('active');
}

// GERAR NOVA LIÇÃO (MODO INFINITO)
function nextLesson() {
    const randomIdx = Math.floor(Math.random() * sentences.length);
    const item = sentences[randomIdx];
    const app = document.getElementById('app');

    app.innerHTML = `
        <div class="card">
            <small style="color:var(--lc)">PHASE: SHADOWING</small>
            <h2 id="current-phrase" style="margin:15px 0">${item.en}</h2>
            <p style="color:#5a5c7a; font-style:italic; margin-bottom:20px">${item.pt}</p>
            
            <div class="speed-row">
                <button class="spd-btn" onclick="speechRate=0.6; alert('Lento')">🐢 Slow</button>
                <button class="spd-btn active" onclick="speechRate=1.0; alert('Normal')">🐰 Normal</button>
                <button class="spd-btn" onclick="speak('${item.en.replace(/'/g, "\\'")}')">🔊 Hear</button>
            </div>

            <div style="display:flex; gap:10px; align-items:center; margin-top:20px;">
                <input type="text" id="user-input" placeholder="Click mic and speak..." 
                    style="flex:1; padding:15px; border-radius:10px; background:#000; color:white; border:1px solid #333;">
                <button id="mic-btn" class="btn-mic" onclick="startListening()">🎤</button>
            </div>

            <button class="next-btn" onclick="validate()">VALIDATE & NEXT</button>
            <div id="feedback" style="margin-top:15px; text-align:center;"></div>
        </div>
    `;
}

function validate() {
    const userText = document.getElementById('user-input').value.toLowerCase();
    if(userText.length > 0) {
        document.getElementById('feedback').innerHTML = "✅ Great job! Keep going!";
        setTimeout(nextLesson, 1500);
    } else {
        alert("Please speak or write something first!");
    }
}

// INICIAR TUDO
window.onload = () => {
    startTimer();
    nextLesson();
};
</script>
</body>
</html>
