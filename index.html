<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BritFlow — A1 to C2</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── SEU CSS ORIGINAL INTEGRAL ─── */
:root{ --bg:#07080d;--s1:#0d0e15;--s2:#13141e;--s3:#191a26; --border:#22243a;--border2:#2c2e48; --text:#f2f0f8;--muted:#5a5c7a;--muted2:#8486a8; --r:15px;--rs:10px; }
.lA1{--lc:#4ecdc4;--lb:#0d2220;} .lA2{--lc:#45b7d1;--lb:#0a1e28;} .lB1{--lc:#96ceb4;--lb:#0e2018;} .lB2{--lc:#ffd93d;--lb:#201a08;} .lC1{--lc:#ff6b6b;--lb:#200d0d;} .lC2{--lc:#c9a0dc;--lb:#180d20;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s;overflow:hidden;}
.screen.active{opacity:1;pointer-events:all;}
#splash{align-items:center;justify-content:center;padding:30px 24px; background:radial-gradient(ellipse at 30% 20%,#1a1428 0%,var(--bg) 60%);}
.splash-logo{font-family:'Fraunces',serif;font-size:2.8rem;font-weight:900; background:linear-gradient(135deg,#fff 0%,#c9a0dc 50%,#4ecdc4 100%); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; letter-spacing:-1px;line-height:1;}
.levels-grid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px;margin-top:20px;}
.level-card{ display:flex;align-items:center;gap:14px;padding:14px 16px; background:var(--s1);border:1px solid var(--border);border-radius:var(--r); cursor:pointer; position:relative; overflow:hidden;}
.level-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lc);}
.lv-badge{ width:44px;height:44px;border-radius:10px; background:var(--lb);border:1px solid var(--lc); display:flex;align-items:center;justify-content:center; font-family:'Fraunces',serif;font-weight:900;color:var(--lc); }
.topbar{ display:flex;align-items:center;justify-content:space-between; padding:11px 16px;background:var(--s1);border-bottom:1px solid var(--border); }
.phasebar{ display:flex;background:var(--s1);border-bottom:1px solid var(--border); overflow-x:auto; }
.ptab{ flex:1; min-width:65px; display:flex; flex-direction:column; align-items:center; padding:10px 5px; font-size:0.65rem; color:var(--muted); cursor:pointer; }
.ptab.active{ color:var(--lc); border-bottom:2px solid var(--lc); }
.content{ flex:1; overflow-y:auto; padding:16px; }

/* ESTILOS DOS NOVOS BOTÕES */
.mic-btn{ background:var(--lc); border:none; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-left:10px; }
.mic-btn.on{ background:#ff4757; animation: pulse 1s infinite; }
.spd-btn{ padding:4px 10px; border-radius:15px; border:1px solid var(--border2); background:var(--s2); color:var(--muted2); font-size:10px; cursor:pointer; }
.spd-btn.active{ border-color:var(--lc); color:var(--lc); }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<div class="screen active" id="splash">
    <div class="splash-logo">BritFlow</div>
    <div class="levels-grid">
        <div class="level-card lA1" onclick="startLevel('A1')"><div class="lv-badge">A1</div><div>Beginner</div></div>
        <div class="level-card lB1" onclick="startLevel('B1')"><div class="lv-badge">B1</div><div>Intermediate</div></div>
        <div class="level-card lC1" onclick="startLevel('C1')"><div class="lv-badge">C1</div><div>Advanced</div></div>
    </div>
</div>

<div class="screen" id="main">
    <div class="topbar">
        <div style="font-family:'Fraunces'; font-weight:900;">BritFlow</div>
        <div style="font-family:'JetBrains Mono'; color:#4ecdc4;">⏳ <span id="timerVal">30:00</span></div>
        <div id="lvTag" style="font-size:0.7rem; padding:3px 8px; border-radius:10px; background:var(--s2); border:1px solid var(--lc); color:var(--lc);">B1</div>
    </div>
    
    <div class="phasebar">
        <div class="ptab active" onclick="goPhase(0)">👂 Listen</div>
        <div class="ptab" onclick="goPhase(1)">🎤 Shadow</div>
        <div class="ptab" onclick="goPhase(2)">🧩 Chunks</div>
        <div class="ptab" onclick="goPhase(3)">📖 Vocab</div>
        <div class="ptab" onclick="goPhase(4)">💬 Speak</div>
    </div>

    <div class="content" id="contentArea"></div>
</div>

<script>
let timeLeft = 30 * 60;
let speechRate = 1.0;
let recognition;
let currentLv = 'B1';

// SIMULAÇÃO DOS SEUS DADOS ORIGINAIS
const DATA = {
    'B1': {
        phrase: "Could I get a flat white, please?",
        trans: "Poderia dar-me um flat white, por favor?",
        chunks: ["Could I get a...", "flat white", "please?"],
        vocab: ["Flat White", "Knackered", "Cheers"]
    }
};

function startLevel(lv) {
    currentLv = lv;
    document.getElementById('lvTag').innerText = lv;
    document.getElementById('splash').classList.remove('active');
    document.getElementById('main').classList.add('active');
    startTimer();
    goPhase(0);
}

function startTimer() {
    setInterval(() => {
        if(timeLeft <= 0) return;
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft % 60;
        document.getElementById('timerVal').innerText = `${m}:${s<10?'0':''}${s}`;
    }, 1000);
}

function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB';
    u.rate = speechRate;
    window.speechSynthesis.speak(u);
}

if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onresult = (e) => {
        const txt = e.results[0][0].transcript;
        if(document.getElementById('voiceInput')) document.getElementById('voiceInput').value = txt;
        document.getElementById('micBtn').classList.remove('on');
    };
}

function toggleMic() {
    recognition.start();
    document.getElementById('micBtn').classList.add('on');
}

function goPhase(p) {
    // Atualiza visual das abas
    document.querySelectorAll('.ptab').forEach((tab, i) => {
        tab.classList.toggle('active', i === p);
    });

    const area = document.getElementById('contentArea');
    const info = DATA[currentLv] || DATA['B1'];

    if(p === 0) { // LISTEN
        area.innerHTML = `
            <div style="margin-bottom:15px; display:flex; gap:10px;">
                <button class="spd-btn ${speechRate < 1 ? 'active' : ''}" onclick="speechRate=0.6; goPhase(0)">🐢 Slow</button>
                <button class="spd-btn ${speechRate === 1 ? 'active' : ''}" onclick="speechRate=1.0; goPhase(0)">🐰 Normal</button>
            </div>
            <div style="background:var(--s1); padding:20px; border-radius:15px; border:1px solid var(--border)">
                <h2 style="font-family:'Fraunces'; margin-bottom:10px;">"${info.phrase}"</h2>
                <p style="color:var(--muted2); font-size:0.9rem; margin-bottom:20px;">${info.trans}</p>
                <button onclick="speak('${info.phrase}')" style="width:100%; padding:15px; background:var(--lc); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">🔊 HEAR AUDIO</button>
            </div>
        `;
    } else if (p === 1) { // SHADOW
        area.innerHTML = `
            <div style="background:var(--s1); padding:20px; border-radius:15px; border:1px solid var(--border)">
                <div style="font-size:0.7rem; color:var(--muted); margin-bottom:10px;">SHADOWING MODE</div>
                <h2 style="font-family:'Fraunces'; margin-bottom:20px;">${info.phrase}</h2>
                <div style="display:flex; align-items:center;">
                    <input type="text" id="voiceInput" placeholder="Click mic and speak..." style="flex:1; padding:12px; border-radius:10px; background:#000; border:1px solid #333; color:white;">
                    <button id="micBtn" class="mic-btn" onclick="toggleMic()">🎤</button>
                </div>
            </div>
        `;
    } else if (p === 2) { // CHUNKS
        area.innerHTML = info.chunks.map(c => `<div style="background:var(--s2); padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid var(--lc);">${c}</div>`).join('');
    } else if (p === 3) { // VOCAB
        area.innerHTML = info.vocab.map(v => `<div style="background:var(--s1); padding:15px; border-radius:10px; margin-bottom:10px; text-align:center; border:1px solid var(--border); font-family:'Fraunces';">${v}</div>`).join('');
    } else if (p === 4) { // SPEAK (CHAT)
        area.innerHTML = `<div style="height:200px; color:var(--muted2); text-align:center; padding-top:50px;">Chat with AI Teacher...</div>
                          <div style="display:flex;"><input type="text" id="voiceInput" style="flex:1; padding:10px; border-radius:10px; background:#000; border:1px solid #333; color:white;"><button class="mic-btn" onclick="toggleMic()">🎤</button></div>`;
    }
}
</script>
</body>
</html>
