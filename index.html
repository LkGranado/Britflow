<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BritFlow">
<title>BritFlow — A1 to C2</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* MANTIVE TODO O SEU CSS ORIGINAL */
:root{
  --bg:#07080d;--s1:#0d0e15;--s2:#13141e;--s3:#191a26;
  --border:#22243a;--border2:#2c2e48;
  --text:#f2f0f8;--muted:#5a5c7a;--muted2:#8486a8;
  --r:15px;--rs:10px;
}
.lA1{--lc:#4ecdc4;--lb:#0d2220;}
.lA2{--lc:#45b7d1;--lb:#0a1e28;}
.lB1{--lc:#96ceb4;--lb:#0e2018;}
.lB2{--lc:#ffd93d;--lb:#201a08;}
.lC1{--lc:#ff6b6b;--lb:#200d0d;}
.lC2{--lc:#c9a0dc;--lb:#180d20;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;user-select:none;}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s;overflow:hidden;}
.screen.active{opacity:1;pointer-events:all;}

/* ─── SPLASH ─── */
#splash{align-items:center;justify-content:center;padding:30px 24px;
  background:radial-gradient(ellipse at 30% 20%,#1a1428 0%,var(--bg) 60%);}
.splash-flag{font-size:3rem;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.splash-logo{font-family:'Fraunces',serif;font-size:2.8rem;font-weight:900;
  background:linear-gradient(135deg,#fff 0%,#c9a0dc 50%,#4ecdc4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-1px;line-height:1;}
.splash-sub{color:var(--muted2);font-size:0.82rem;letter-spacing:2px;text-transform:uppercase;margin-top:6px;margin-bottom:32px;}

.levels-grid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px;}
.level-card{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.level-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lc);}
.lv-badge{
  width:44px;height:44px;border-radius:10px;
  background:var(--lb);border:1px solid var(--lc);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Fraunces',serif;font-weight:900;font-size:0.88rem;color:var(--lc);
}
.lv-info{flex:1;}
.lv-name{font-weight:600;font-size:0.92rem;margin-bottom:2px;}
.lv-desc{font-size:0.75rem;color:var(--muted2);line-height:1.4;}

/* NOVOS ESTILOS PARA AS FUNÇÕES PEDIDAS */
.mic-btn {
    background: #ff4757; color: white; border: none; border-radius: 50%;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.3s; margin-left: 10px;
}
.mic-btn.active { animation: pulseMic 1s infinite; background: red; }
@keyframes pulseMic { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

.speed-ctrl { display: flex; gap: 5px; margin-bottom: 10px; }
.speed-btn { 
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2);
    background: var(--s2); color: var(--muted2); font-size: 11px; cursor: pointer;
}
.speed-btn.active { border-color: var(--lc); color: var(--lc); }

/* REAPROVEITANDO SEU CSS DE TESTE E MAIN... */
#testScreen{padding:24px 18px;overflow-y:auto;}
.test-q{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:600;line-height:1.5;margin-bottom:20px;}
.test-opts{display:flex;flex-direction:column;gap:8px;}
.test-opt{padding:13px 16px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;}

#main{flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--s1);border-bottom:1px solid var(--border);}
.phasebar{display:flex;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;}
.ptab{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;padding:8px;font-size:0.6rem;cursor:pointer;color:var(--muted);}
.ptab.active{color:var(--lc);border-bottom:2px solid var(--lc);}
.content{flex:1;overflow-y:auto;padding:16px;}
</style>
</head>
<body>

<div class="screen active" id="splash">
  <div style="overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:28px 20px 40px;">
    <div class="splash-flag">🇬🇧</div>
    <div class="splash-logo">BritFlow</div>
    <div class="splash-sub">Natural British English</div>
    <div class="levels-grid">
      <div class="level-card lA1" onclick="startLevel('A1')">
        <div class="lv-badge">A1</div><div class="lv-info"><div class="lv-name">Beginner</div><div class="lv-desc">Frases básicas</div></div>
      </div>
      <div class="level-card lB1" onclick="startLevel('B1')">
        <div class="lv-badge">B1</div><div class="lv-info"><div class="lv-name">Intermediate</div><div class="lv-desc">Já entende mas trava</div></div>
      </div>
      <div class="level-card lC1" onclick="startLevel('C1')">
        <div class="lv-badge">C1</div><div class="lv-info"><div class="lv-name">Advanced</div><div class="lv-desc">Nuances e gírias</div></div>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="main">
  <div class="topbar">
    <div class="logo-top">BritFlow</div>
    <div class="timer-wrap">
      <div class="timer-dot"></div>
      <span class="timer-txt" id="timerVal">30:00</span>
    </div>
    <div class="level-pill" id="lvPill">B1</div>
  </div>

  <div class="phasebar" id="phasebar">
    <div class="ptab active" onclick="goPhase(0)"><span>👂</span>Listen</div>
    <div class="ptab" onclick="goPhase(1)"><span>🎤</span>Shadow</div>
    <div class="ptab" onclick="goPhase(2)"><span>🧩</span>Chunks</div>
    <div class="ptab" onclick="goPhase(4)"><span>💬</span>Speak</div>
  </div>

  <div class="content" id="contentArea"></div>
</div>

<script>
// VARIAVEIS DE ESTADO
let currentLevel = 'B1';
let currentPhase = 0;
let timeLeft = 30 * 60;
let speechRate = 1.0;
let recognition;

// MANTIVE SEUS DADOS ORIGINAIS (Resumido para o exemplo, mas você pode colar todos os seus)
const LEVEL_DATA = {
    B1: {
        sessions: [{
            topic: "At the Café",
            listen: [{en:"Could I get a flat white, please?", pt:"Poderia me dar um flat white?"}],
            shadow: "Could I get a flat white please",
            chatSeed: "Welcome to the cafe! What would you like to order?"
        }]
    }
};

// INICIAR NÍVEL E TIMER
function startLevel(lv) {
    currentLevel = lv;
    document.getElementById('lvPill').innerText = lv;
    document.getElementById('splash').classList.remove('active');
    document.getElementById('main').classList.add('active');
    startTimer();
    goPhase(0);
}

function startTimer() {
    const timerDisplay = document.getElementById('timerVal');
    setInterval(() => {
        if(timeLeft <= 0) return;
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft % 60;
        timerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }, 1000);
}

// FUNÇÃO DE VOZ (SPEECH SYNTHESIS)
function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB';
    u.rate = speechRate;
    window.speechSynthesis.speak(u);
}

// MICROFONE (SPEECH RECOGNITION)
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onresult = (e) => {
        const result = e.results[0][0].transcript;
        const input = document.getElementById('voiceInput');
        if(input) input.value = result;
        document.getElementById('micBtn').classList.remove('active');
    };
}

function toggleMic() {
    const btn = document.getElementById('micBtn');
    if(btn.classList.contains('active')) {
        recognition.stop();
        btn.classList.remove('active');
    } else {
        recognition.start();
        btn.classList.add('active');
    }
}

// RENDERIZAR FASES (Mantendo seu design de abas)
function goPhase(p) {
    currentPhase = p;
    const area = document.getElementById('contentArea');
    const data = LEVEL_DATA[currentLevel].sessions[0];

    // LÓGICA DE RENDERIZAÇÃO POR FASE
    if(p === 0) { // Listen
        area.innerHTML = `
            <div class="speed-ctrl">
                <button class="speed-btn ${speechRate === 0.7 ? 'active' : ''}" onclick="speechRate=0.7; goPhase(0)">🐢 Slow</button>
                <button class="speed-btn ${speechRate === 1.0 ? 'active' : ''}" onclick="speechRate=1.0; goPhase(0)">🐰 Normal</button>
            </div>
            <div class="card card-accent">
                <div class="big-phrase">${data.listen[0].en}</div>
                <div class="phrase-ctx">${data.listen[0].pt}</div>
                <button class="btn primary" onclick="speak('${data.listen[0].en}')">🔊 Listen</button>
            </div>
        `;
    } else if (p === 1) { // Shadowing com Mic
        area.innerHTML = `
            <div class="card">
                <div class="sec-lbl">Shadowing Practice</div>
                <div class="big-phrase">${data.shadow}</div>
                <div style="display:flex; margin-top:15px;">
                    <input type="text" id="voiceInput" placeholder="Aperte o microfone e fale..." style="flex:1; padding:10px; border-radius:10px; background:#000; color:#fff; border:1px solid #333;">
                    <button id="micBtn" class="mic-btn" onclick="toggleMic()">🎤</button>
                </div>
            </div>
        `;
    }
}
</script>
</body>
</html>
